; .user.ini — PHP settings untuk PHP-FPM (Apache + mod_php tidak butuh file ini)
; File ini otomatis dibaca oleh PHP-FPM pada setiap request
; Berlaku untuk folder ini dan semua sub-folder

display_errors = Off
log_errors = On
error_log = logs/php_error.log
max_execution_time = 30
memory_limit = 128M
post_max_size = 10M
upload_max_filesize = 10M
